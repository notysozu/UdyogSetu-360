apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-service
  namespace: udyogsetu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: case-service
  template:
    metadata:
      labels:
        app: case-service
    spec:
      containers:
        - name: case-service
          image: registry.example/udyogsetu/case-service:latest
          ports:
            - containerPort: 4100
          envFrom:
            - configMapRef:
                name: udyogsetu-config
            - secretRef:
                name: udyogsetu-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4100
