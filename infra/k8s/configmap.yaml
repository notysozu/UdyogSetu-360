apiVersion: v1
kind: ConfigMap
metadata:
  name: udyogsetu-config
  namespace: udyogsetu
data:
  NODE_ENV: production
  CORS_ORIGINS: https://example.gov.in
  KAFKA_ENABLED: "true"
  KAFKA_BROKERS: kafka:9092
  RABBITMQ_ENABLED: "true"
  S3_BUCKET: udyogsetu-documents
  AI_SERVICE_BASE_URL: http://ai-service:8000
  AI_ADVISORY_BASE_URL: http://ai-service:8000
