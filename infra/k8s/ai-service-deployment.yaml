apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: udyogsetu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: registry.example/udyogsetu/ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: udyogsetu-config
            - secretRef:
                name: udyogsetu-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
