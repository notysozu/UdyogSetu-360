apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: udyogsetu-ingress
  namespace: udyogsetu
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - udyogsetu.example.gov.in
      secretName: udyogsetu-tls
  rules:
    - host: udyogsetu.example.gov.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 4000
