name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r services/ai-service/requirements.txt
      - run: npm test
      - run: python -m pytest app/tests
        working-directory: services/ai-service
      - run: node --test tests/contract/*.test.js tests/security/*.test.js tests/e2e/*.test.js
